<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>キャッシュフロー管理</title>
<style>
/* ─── リセット＆ベース ─────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html{background:#e8e7e0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;font-size:14px;color:#1a1a1a;background:#e8e7e0;min-height:100vh;display:flex;justify-content:center}
#wrap{width:100%;max-width:480px;min-height:100vh;background:#f0efe8;position:relative}

/* ─── ヘッダー ─────────────────────────────────────────── */
.hdr{background:#fff;border-bottom:1px solid #e4e3dc;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.mnav{display:flex;align-items:center;gap:6px}
.mnav button{background:none;border:none;cursor:pointer;font-size:22px;color:#777;padding:2px 8px;-webkit-tap-highlight-color:transparent;line-height:1}
.mnav span{font-size:14px;font-weight:600;min-width:90px;text-align:center}
.hdr-btns{display:flex;gap:6px}

/* ─── ナビゲーション ───────────────────────────────────── */
.nav{display:flex;background:#fff;border-top:1px solid #e4e3dc;position:sticky;bottom:0;z-index:50}
.nbtn{flex:1;padding:7px 2px 9px;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;font-size:9px;color:#aaa;-webkit-tap-highlight-color:transparent}
.nbtn.on{color:#2563eb}
.nicon{font-size:20px;line-height:1.2}

/* ─── ページ ───────────────────────────────────────────── */
.page{padding:12px;padding-bottom:80px}

/* ─── カード ───────────────────────────────────────────── */
.card{background:#fff;border-radius:14px;border:1px solid #eaeae4;margin-bottom:10px;overflow:hidden}
.chd{padding:11px 14px;border-bottom:1px solid #f0efe8;display:flex;align-items:center;justify-content:space-between}
.cti{font-size:12px;font-weight:600;color:#888}
.cbd{padding:12px 14px}

/* ─── メトリクス ───────────────────────────────────────── */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mcard{background:#fff;border-radius:12px;border:1px solid #eaeae4;padding:11px 12px}
.mlbl{font-size:11px;color:#aaa;margin-bottom:3px}
.mval{font-size:18px;font-weight:700}
.ci{color:#0a7a5e}.ce{color:#b03a1a}.cp{color:#1d4ed8}.cn{color:#c0392b}

/* ─── ボタン ───────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 13px;border-radius:9px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#333;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.btn:active{opacity:.75}
.btn-blue{background:#2563eb;color:#fff;border-color:#2563eb}
.btn-red{color:#c0392b;border-color:#f0a0a0;background:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:5px 6px;border:none;background:none;cursor:pointer;font-size:15px;color:#ccc;border-radius:6px;-webkit-tap-highlight-color:transparent}
.btn-icon:active{opacity:.6}

/* ─── フォーム ─────────────────────────────────────────── */
.fgrp{margin-bottom:12px}
.flbl{font-size:12px;color:#777;margin-bottom:4px;display:block;font-weight:500}
.finp{width:100%;padding:10px 12px;border-radius:9px;border:1px solid #ddd;background:#fff;font-size:15px;color:#1a1a1a;outline:none;-webkit-appearance:none;appearance:none}
.finp:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.frow{display:flex;gap:8px}
.frow>.fgrp{flex:1}

/* ─── バッジ ───────────────────────────────────────────── */
.bdg{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.b1{background:#dbeafe;color:#1e40af}
.b2{background:#dcfce7;color:#166534}
.b3{background:#fef3c7;color:#92400e}
.b4{background:#fee2e2;color:#991b1b}
.b5{background:#ede9fe;color:#5b21b6}
.b6{background:#f3f4f6;color:#555}

/* ─── タブ ─────────────────────────────────────────────── */
.tabs{display:flex;gap:5px;margin-bottom:11px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;border-radius:20px;border:1px solid #ddd;background:none;cursor:pointer;font-size:12px;font-weight:600;color:#888;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tab.on{background:#2563eb;color:#fff;border-color:#2563eb}

/* ─── 取引アイテム ─────────────────────────────────────── */
.txitem{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f2f2ec}
.txitem:last-child{border-bottom:none}
.txico{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.txi-i{background:#dcfce7;color:#0a7a5e}
.txi-e{background:#fee2e2;color:#b03a1a}
.txinfo{flex:1;min-width:0}
.txname{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.txmeta{font-size:10px;color:#aaa;margin-top:2px}
.txamt{font-size:13px;font-weight:700;flex-shrink:0}
.txamt-i{color:#0a7a5e}.txamt-e{color:#b03a1a}

/* ─── リストアイテム（固定費・サブスク） ───────────────── */
.litem{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f2f2ec}
.litem:last-child{border-bottom:none}
.linfo{flex:1;min-width:0}
.lname{font-size:13px;font-weight:600}
.lsub{font-size:11px;color:#aaa;margin-top:2px}
.lamt{font-size:14px;font-weight:700;flex-shrink:0;color:#1a1a1a}
.lacts{display:flex;gap:0;flex-shrink:0}

/* ─── プログレスバー ───────────────────────────────────── */
.pbar{height:6px;background:#f0efe8;border-radius:3px;overflow:hidden;margin-top:4px}
.pfill{height:100%;border-radius:3px;transition:width .3s}

/* ─── クレカカラーバー ─────────────────────────────────── */
.cbar{display:flex;height:9px;border-radius:5px;overflow:hidden;margin:7px 0 10px}

/* ─── アコーディオン ───────────────────────────────────── */
.acchd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:11px 14px;-webkit-tap-highlight-color:transparent}

/* ─── 検索ボックス ─────────────────────────────────────── */
.sbox{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:8px 12px;margin-bottom:10px}
.sbox input{border:none;background:none;outline:none;flex:1;font-size:14px;color:#1a1a1a;-webkit-appearance:none}

/* ─── モーダル ─────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:18px;padding:20px 16px 24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;text-align:center}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.modal-btns .btn{flex:1;justify-content:center}

/* ─── イレギュラー期間タグ ─────────────────────────────── */
.irr-tag{display:inline-flex;align-items:center;gap:4px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600;margin-top:3px}

/* ─── その他 ───────────────────────────────────────────── */
.empty{text-align:center;padding:20px;color:#ccc;font-size:13px}
canvas{display:block;background:#fff;border-radius:0}
</style>
</head>
<body>
<div id="wrap"></div>
<script>
(function(){
'use strict';

/* ══════════════════════════════════════════════════════
   定数
══════════════════════════════════════════════════════ */
var IC=['給料','副業','ココナラ','アプリ売上','動画編集','その他'];
var EC=['食費','交通費','固定費','サブスク','娯楽','美容','日用品','その他'];
var CATCOL={'給料':'b2','副業':'b1','ココナラ':'b5','アプリ売上':'b3','動画編集':'b4','その他':'b6',
  '食費':'b4','交通費':'b1','固定費':'b3','サブスク':'b5','娯楽':'b2','美容':'b6','日用品':'b1'};
var CRDS=['楽天カード','三井住友カード','ビューカード'];
var CCOL=['#2563eb','#0a7a5e','#d97706'];

/* ══════════════════════════════════════════════════════
   ユーティリティ
══════════════════════════════════════════════════════ */
function fmt(n){return '¥'+Math.abs(Math.round(n)).toLocaleString('ja-JP');}
function today(){return new Date().toISOString().split('T')[0];}
function nowYM(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1);}
function p2(n){return String(n).padStart(2,'0');}
function sumArr(a,f){return a.reduce(function(s,x){return s+(f?f(x):x);},0);}

// DOM builder
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs) for(var k in attrs){
    var v=attrs[k];
    if(k==='cls') e.className=v;
    else if(k==='style') Object.assign(e.style,v);
    else if(k.slice(0,2)==='on') e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  }
  if(children!=null)[].concat(children).forEach(function(c){
    if(c==null||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}
function div(cls,ch){return el('div',cls?{cls:cls}:null,ch);}
function span(cls,ch){return el('span',cls?{cls:cls}:null,ch);}
function txt(s){return document.createTextNode(String(s));}
function card(title,right){
  var c=div('card');
  var hd=div('chd',[span('cti',title)]);
  if(right) hd.appendChild(right);
  c.appendChild(hd);
  return c;
}
function mc(label,val,cls){
  var m=div('mcard',[div('mlbl',label),div('mval '+cls,val)]);
  return m;
}
function pbar(pct,color){
  var b=div('pbar'); var f=div('pfill');
  f.style.width=pct+'%'; f.style.background=color;
  b.appendChild(f); return b;
}
function bdg(text,cls){return span('bdg '+cls,text);}
function fg(label,input){
  var g=div('fgrp',[el('label',{cls:'flbl'},label),input]);
  return g;
}

/* ══════════════════════════════════════════════════════
   状態管理
   ④ 過去月確定のため、ledger（確定済み月次スナップショット）を持つ
══════════════════════════════════════════════════════ */
var S={
  page:'dashboard',
  ym:nowYM(),
  incomes:[
    {id:1,date:'2026-05-01',amount:250000,category:'給料',     name:'5月給与',     memo:''},
    {id:2,date:'2026-05-10',amount:55000, category:'アプリ売上',name:'アプリ収益',  memo:''},
    {id:3,date:'2026-05-15',amount:35000, category:'ココナラ',  name:'デザイン案件',memo:''},
    {id:4,date:'2026-05-12',amount:80000, category:'動画編集',  name:'動画編集案件',memo:''},
  ],
  expenses:[
    {id:1,date:'2026-05-02',amount:12000,payment:'楽天カード',    category:'食費',  name:'スーパーまとめ買い',memo:''},
    {id:2,date:'2026-05-03',amount:2500, payment:'PayPay',        category:'食費',  name:'カフェ',           memo:''},
    {id:3,date:'2026-05-05',amount:68000,payment:'三井住友カード',category:'固定費',name:'家賃',             memo:''},
    {id:4,date:'2026-05-07',amount:980,  payment:'楽天カード',    category:'サブスク',name:'Netflix',        memo:''},
    {id:5,date:'2026-05-08',amount:3000, payment:'ビューカード',  category:'交通費', name:'新幹線',          memo:''},
    {id:6,date:'2026-05-10',amount:8000, payment:'楽天カード',    category:'娯楽',  name:'ゲーム',           memo:''},
    {id:7,date:'2026-05-11',amount:1500, payment:'PayPay',        category:'食費',  name:'コンビニ',         memo:''},
    {id:8,date:'2026-05-13',amount:5000, payment:'現金',          category:'美容',  name:'散髪',             memo:''},
    {id:9,date:'2026-05-14',amount:3500, payment:'三井住友カード',category:'食費',  name:'外食',             memo:''},
  ],
  payments:['現金','PayPay','楽天カード','三井住友カード','ビューカード'],
  // サブスク・固定費：irregulars=[{ym:'2026-06',amount:2000}] で月ごと上書き可能
  subs:[
    {id:1,name:'Netflix',    amount:980, day:7, payment:'楽天カード',   irregulars:[]},
    {id:2,name:'ChatGPT Plus',amount:3200,day:15,payment:'楽天カード',  irregulars:[]},
    {id:3,name:'Adobe CC',   amount:6480,day:1, payment:'三井住友カード',irregulars:[]},
    {id:4,name:'Spotify',    amount:980, day:10,payment:'楽天カード',   irregulars:[]},
  ],
  fixed:[
    {id:1,name:'家賃',  amount:68000,payment:'三井住友カード',irregulars:[]},
    {id:2,name:'電気代',amount:8000, payment:'楽天カード',   irregulars:[]},
    {id:3,name:'水道代',amount:3000, payment:'現金',         irregulars:[]},
    {id:4,name:'ガス代',amount:2500, payment:'現金',         irregulars:[]},
  ],
  // ④ 確定済み月次データ: {ym: {fixed:[{name,amount}], subs:[{name,amount}]}}
  locked:{},
  modal:null, edit:null, confirmCb:null,
  txTab:'all', txQ:'', txCat:'', txPay:'',
  openCard:null,
  // イレギュラー編集用
  irrTarget:null, // {type:'fixed'|'sub', id, ym}
};

/* ══════════════════════════════════════════════════════
   月次の固定費・サブスク金額を取得（③④）
   - 確定済み（locked）があればそれを使う
   - なければ irregulars の該当月があればそれ、なければ通常額
══════════════════════════════════════════════════════ */
function getAmount(item, ym){
  // ④ 確定済みデータがあればそちら優先
  if(S.locked[ym]){
    return null; // lockedがある月はledgerで別途管理
  }
  // ③ イレギュラー
  var irr=(item.irregulars||[]).find(function(x){return x.ym===ym;});
  return irr ? irr.amount : item.amount;
}

// 確定済みチェック（今月より前 = 過去月）
function isLocked(ym){
  return ym < nowYM();
}

// ロック（月次確定）を実行
function lockMonth(ym){
  if(S.locked[ym]) return;
  S.locked[ym]={
    fixed:S.fixed.map(function(f){return {id:f.id,name:f.name,amount:getEffectiveAmount(f,ym)};}),
    subs: S.subs.map(function(s){return {id:s.id,name:s.name,amount:getEffectiveAmount(s,ym)};})
  };
}

function getEffectiveAmount(item,ym){
  var irr=(item.irregulars||[]).find(function(x){return x.ym===ym;});
  return irr ? irr.amount : item.amount;
}

// その月の固定費リストを返す
function getFixedForYM(ym){
  if(S.locked[ym]) return S.locked[ym].fixed;
  return S.fixed.map(function(f){return {id:f.id,name:f.name,amount:getEffectiveAmount(f,ym),payment:f.payment,irregulars:f.irregulars};});
}
function getSubsForYM(ym){
  if(S.locked[ym]) return S.locked[ym].subs;
  return S.subs.map(function(s){return {id:s.id,name:s.name,amount:getEffectiveAmount(s,ym),payment:s.payment,day:s.day,irregulars:s.irregulars};});
}

/* ══════════════════════════════════════════════════════
   集計
══════════════════════════════════════════════════════ */
function calc(ym){
  ym=ym||S.ym;
  var yr=+ym.slice(0,4), mo=+ym.slice(5);
  var mI=S.incomes.filter(function(x){return x.date.slice(0,7)===ym;});
  var mE=S.expenses.filter(function(x){return x.date.slice(0,7)===ym;});
  var tI=sumArr(mI,function(x){return x.amount;});
  var tE=sumArr(mE,function(x){return x.amount;});
  var fixList=getFixedForYM(ym);
  var subList=getSubsForYM(ym);
  var fT=sumArr(fixList,function(x){return x.amount;});
  var sT=sumArr(subList,function(x){return x.amount;});
  var crT=sumArr(mE.filter(function(e){return CRDS.indexOf(e.payment)>=0;}),function(x){return x.amount;});
  var yI=sumArr(S.incomes.filter(function(x){return x.date.slice(0,4)===''+yr;}),function(x){return x.amount;});
  var yE=sumArr(S.expenses.filter(function(x){return x.date.slice(0,4)===''+yr;}),function(x){return x.amount;});
  return {ym:ym,yr:yr,mo:mo,mI:mI,mE:mE,tI:tI,tE:tE,bal:tI-tE,fT:fT,sT:sT,rem:tI-tE-fT,crT:crT,yI:yI,yE:yE,fixList:fixList,subList:subList};
}

/* ══════════════════════════════════════════════════════
   レンダリング
══════════════════════════════════════════════════════ */
function render(){
  var root=document.getElementById('wrap');
  root.innerHTML='';
  var c=calc();
  root.appendChild(buildHeader(c));
  var pg=div('page');
  if(S.page==='dashboard')    pg.appendChild(buildDash(c));
  if(S.page==='transactions') pg.appendChild(buildTx(c));
  if(S.page==='credit')       pg.appendChild(buildCredit(c));
  if(S.page==='cashflow')     pg.appendChild(buildFlow(c));
  if(S.page==='settings')     pg.appendChild(buildSettings(c));
  root.appendChild(pg);
  root.appendChild(buildNav());
  // モーダル
  if(S.modal==='income')   root.appendChild(moIncome());
  if(S.modal==='expense')  root.appendChild(moExpense());
  if(S.modal==='sub')      root.appendChild(moSub());
  if(S.modal==='fixed')    root.appendChild(moFixed());
  if(S.modal==='irr')      root.appendChild(moIrr());
  if(S.modal==='confirm')  root.appendChild(moConfirm());
  if(S.modal==='editpay')  root.appendChild(moEditPay());
  requestAnimationFrame(drawGraphs);
}

/* ══════════════════════════════════════════════════════
   ヘッダー
══════════════════════════════════════════════════════ */
function buildHeader(c){
  var h=div('hdr');
  var mn=div('mnav');
  var pb2=el('button',{onclick:function(){changeMonth(-1);}},'‹');
  var nb2=el('button',{onclick:function(){changeMonth(1);}},'›');
  mn.append(pb2,el('span',{},c.yr+'年'+c.mo+'月'),nb2);
  var bs=div('hdr-btns');
  bs.appendChild(el('button',{cls:'btn btn-sm',onclick:function(){openM('income',null);}},'＋収入'));
  bs.appendChild(el('button',{cls:'btn btn-blue btn-sm',onclick:function(){openM('expense',null);}},'＋支出'));
  h.append(mn,bs);
  return h;
}

/* ══════════════════════════════════════════════════════
   ナビ
══════════════════════════════════════════════════════ */
function buildNav(){
  var n=el('nav',{cls:'nav'});
  [['dashboard','📊','ダッシュ'],['transactions','📋','収支'],['credit','💳','クレカ'],['cashflow','📈','推移'],['settings','⚙️','設定']].forEach(function(x){
    var b=el('button',{cls:'nbtn'+(S.page===x[0]?' on':'')});
    b.addEventListener('click',function(){S.page=x[0];render();});
    b.appendChild(span('nicon',x[1]));
    b.appendChild(txt(x[2]));
    n.appendChild(b);
  });
  return n;
}

/* ══════════════════════════════════════════════════════
   ダッシュボード
══════════════════════════════════════════════════════ */
function buildDash(c){
  var f=document.createDocumentFragment();
  // 4メトリクス
  var mg=div('mgrid',[mc('今月収入',fmt(c.tI),'ci'),mc('今月支出',fmt(c.tE),'ce'),mc('今月収支',(c.bal>=0?'+':'')+fmt(c.bal),c.bal>=0?'cp':'cn'),mc('カード合計',fmt(c.crT),'ce')]);
  f.appendChild(mg);
  // 残額
  var remPct=c.tI>0?Math.min(100,Math.round(c.rem/c.tI*100)):0;
  var rc=card('今月の残額',span('',{style:{fontSize:'11px',color:'#aaa'}},'収入−支出−固定費'));
  var rb=div('cbd');
  var rv=div('');rv.style.cssText='display:flex;align-items:baseline;gap:7px;margin-bottom:7px';
  rv.append(el('span',{style:{fontSize:'21px',fontWeight:'700',color:c.rem>=0?'#1d4ed8':'#c0392b'}},fmt(c.rem)),el('span',{style:{fontSize:'11px',color:'#aaa'}},'あと使える'));
  rb.appendChild(rv);rb.appendChild(pbar(remPct,c.rem>=0?'#1d4ed8':'#c0392b'));
  var rs=div('');rs.style.cssText='display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#aaa';
  rs.append(el('span',{},'固定費 '+fmt(c.fT)),el('span',{},'サブスク '+fmt(c.sT)));
  rb.appendChild(rs);rc.appendChild(rb);f.appendChild(rc);
  // クレカ
  var crCards=CRDS.map(function(n,i){return {name:n,col:CCOL[i],amt:sumArr(c.mE.filter(function(e){return e.payment===n;}),function(e){return e.amount;})};}).filter(function(x){return x.amt>0;});

function buildFlow(c){
  var f=document.createDocumentFragment();
  var yr=c.yr;
  var ms=Array.from({length:12},function(_,i){return yr+'-'+p2(i+1);});
  var iD=ms.map(function(m){return sumArr(S.incomes.filter(function(x){return x.date.slice(0,7)===m;}),function(x){return x.amount;});});
  var eD=ms.map(function(m){return sumArr(S.expenses.filter(function(x){return x.date.slice(0,7)===m;}),function(x){return x.amount;});});
  var bD=ms.map(function(_,i){return iD[i]-eD[i];});
  var aI=sumArr(iD),aE=sumArr(eD),aB=aI-aE;
  var mg=div('mgrid',[mc('年間収入',fmt(aI),'ci'),mc('年間支出',fmt(aE),'ce')]);
  var bm=mc('年間収支',(aB>=0?'+':'')+fmt(aB),aB>=0?'cp':'cn');
  bm.style.gridColumn='1/-1';mg.appendChild(bm);f.appendChild(mg);
  var gc=card(yr+'年 月別キャッシュフロー',null);
  var gb=div('cbd');gb.style.padding='10px 8px';
  var cv=el('canvas',{id:'g-cf'});cv.style.cssText='width:100%;height:190px';
  gb.appendChild(cv);gc.appendChild(gb);f.appendChild(gc);
  S._cfM=ms;S._cfI=iD;S._cfE=eD;S._cfB=bD;
  var dc=card('月別明細',null);var db=div('cbd');db.style.padding='0';
  ms.forEach(function(m,i){

    var row=div('');row.style.cssText='padding:9px 14px;border-bottom:1px solid #f5f5f0';
    var top=div('');top.style.cssText='display:flex;justify-content:space-between';
    top.append(el('span',{style:{fontWeight:'600',fontSize:'13px'}},m.slice(5)+'月'),el('span',{style:{fontWeight:'700',color:b>=0?'#1d4ed8':'#c0392b',fontSize:'13px'}},(b>=0?'+':'')+fmt(b)));
    var sub=div('');sub.style.cssText='font-size:11px;color:#bbb;margin-top:2px';
    sub.textContent='収入 '+fmt(iD[i])+'　支出 '+fmt(eD[i]);
    row.append(top,sub);db.appendChild(row);
  });
  dc.appendChild(db);f.appendChild(dc);
  var catT={};
  S.expenses.filter(function(e){return e.date.slice(0,4)===''+yr;}).forEach(function(e){catT[e.category]=(catT[e.category]||0)+e.amount;});
  var catE=Object.entries(catT).sort(function(a,b){return b[1]-a[1];});
  if(catE.length){
    var cc2=card('年間カテゴリ別支出',null);var cb2=div('cbd');
    catE.forEach(function(kv){
      var row=div('');row.style.marginBottom='9px';
      var top2=div('');top2.style.cssText='display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px';
      top2.append(el('span',{},kv[0]),el('span',{style:{fontWeight:'700'}},fmt(kv[1])));
      row.append(top2,pbar(catE[0][1]>0?Math.round(kv[1]/catE[0][1]*100):0,'#2563eb'));
      cb2.appendChild(row);
    });
    cc2.appendChild(cb2);f.appendChild(cc2);
  }
  return f;
}

function txRow(item){
  var row=div('txitem');
  var ico=div('txico '+(item.type==='income'?'txi-i':'txi-e'),item.type==='income'?'↓':'↑');
  var info=div('txinfo',[div('txname',item.name)]);
  var meta=div('txmeta',[bdg(item.category,CATCOL[item.category]||'b6')]);
  if(item.payment)meta.appendChild(txt(' '+item.payment));
  meta.appendChild(txt(' '+item.date.slice(5).replace('-','/')));
  info.appendChild(meta);
  var amt=span('txamt '+(item.type==='income'?'txamt-i':'txamt-e'),(item.type==='income'?'+':'-')+fmt(item.amount));
  var acts=div('lacts');
  var eb=el('button',{cls:'btn-icon',title:'編集'},'✎');
  eb.addEventListener('click',function(){openM(item.type==='income'?'income':'expense',item);});
  var db=el('button',{cls:'btn-icon',title:'削除'},'🗑');
  db.addEventListener('click',function(){
    confirm2(function(){
      if(item.type==='income')S.incomes=S.incomes.filter(function(x){return x.id!==item.id;});
      else S.expenses=S.expenses.filter(function(x){return x.id!==item.id;});
      render();
    });
  });
  acts.append(eb,db);
  row.append(ico,info,amt,acts);
  return row;
}

/* ══════════════════════════════════════════════════════
   ③ イレギュラーモーダル（月別金額変更）
══════════════════════════════════════════════════════ */
function moIrr(){
  var target=S.irrTarget;
  var list=target.type==='fixed'?S.fixed:S.subs;
  var item=list.find(function(x){return x.id===target.id;});
  if(!item){closeM();return div('');}
  var body=div('');
  // 説明
  var note=div('');note.style.cssText='font-size:12px;color:#888;margin-bottom:14px;line-height:1.6;background:#f8f8f2;border-radius:8px;padding:10px';
  note.textContent='通常額：'+fmt(item.amount)+'　特定の月だけ違う金額を設定できます。設定した月はその金額が使われ、設定のない月は通常額が使われます。';
  body.appendChild(note);
  // 既存のイレギュラー一覧
  var irrList=div('');irrList.style.marginBottom='14px';
  var irrs=item.irregulars||[];
  if(irrs.length){
    irrs.sort(function(a,b){return a.ym.localeCompare(b.ym);}).forEach(function(irr){
      var row=div('');row.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f0;font-size:13px';
      var yr=irr.ym.slice(0,4);var mo=irr.ym.slice(5);
      row.appendChild(el('span',{style:{flex:'1',fontWeight:'500'}},yr+'年'+mo+'月'));
      row.appendChild(el('span',{style:{fontWeight:'700'}},fmt(irr.amount)));
      var db=el('button',{cls:'btn-icon'},'🗑');
      db.addEventListener('click',function(){
        item.irregulars=item.irregulars.filter(function(x){return x.ym!==irr.ym;});
        render();S.irrTarget=target;openM('irr',null);
      });
      row.appendChild(db);irrList.appendChild(row);
    });
  } else {
    irrList.appendChild(div('empty','設定なし'));
  }
  body.appendChild(irrList);
  // 新規追加フォーム
  var addNote=div('');addNote.style.cssText='font-size:12px;font-weight:600;color:#555;margin-bottom:8px';addNote.textContent='新しい期間を追加';
  body.appendChild(addNote);
  var f={ym:target.ym||nowYM(),amount:''};
  var ymI=el('input',{type:'month',cls:'finp'});ymI.value=f.ym;ymI.addEventListener('change',function(e){f.ym=e.target.value;});
  var ai=el('input',{type:'number',cls:'finp',placeholder:'その月の金額'});ai.addEventListener('input',function(e){f.amount=e.target.value;});
  body.append(fg('対象月',ymI),fg('金額',ai));
  return makeOverlay(item.name+'の月別金額',body,function(){
    if(!f.amount)return;
    var amt=Number(f.amount);
    var existing=item.irregulars.findIndex(function(x){return x.ym===f.ym;});
    if(existing>=0)item.irregulars[existing].amount=amt;
    else item.irregulars.push({ym:f.ym,amount:amt});
    closeM();
  },'追加する');
}

/* ══════════════════════════════════════════════════════
   Canvas グラフ
══════════════════════════════════════════════════════ */
function drawGraphs(){
  drawBar();
  drawPie();
  drawCF();
}

function drawBar(){
  var cv=document.getElementById('g-dash');if(!cv)return;
  var W=Math.max(cv.parentElement.clientWidth-16,260);var H=160;
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  var c=calc();var yr=c.yr;var mo=c.mo;
  var months6=Array.from({length:6},function(_,i){var dt=new Date(yr,mo-1-5+i,1);return dt.getFullYear()+'-'+p2(dt.getMonth()+1);});
  var iD=months6.map(function(m){return sumArr(S.incomes.filter(function(x){return x.date.slice(0,7)===m;}),function(x){return x.amount;});});
  var eD=months6.map(function(m){return sumArr(S.expenses.filter(function(x){return x.date.slice(0,7)===m;}),function(x){return x.amount;});});
  renderBarChart(ctx,W,H,months6.map(function(m){return m.slice(5)+'月';}),iD,eD);
}

function drawCF(){
  var cv=document.getElementById('g-cf');if(!cv||!S._cfM)return;
  var W=Math.max(cv.parentElement.clientWidth-16,260);var H=190;
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  renderCFChart(ctx,W,H,S._cfM.map(function(m){return (parseInt(m.slice(5)))+'月';}),S._cfI,S._cfE,S._cfB);
}

function drawPie(){
  var cv=document.getElementById('g-pie');if(!cv||!S._catE||!S._catE.length)return;
  var sz=88;cv.width=sz;cv.height=sz;
  var ctx=cv.getContext('2d');
  var total=sumArr(S._catE,function(kv){return kv[1];});
  var start=-Math.PI/2;
  S._catE.forEach(function(kv,i){
    var angle=kv[1]/total*Math.PI*2;
    ctx.beginPath();ctx.moveTo(sz/2,sz/2);ctx.arc(sz/2,sz/2,sz/2-2,start,start+angle);ctx.closePath();
    ctx.fillStyle=S._catCols[i];ctx.fill();start+=angle;
  });
  ctx.beginPath();ctx.arc(sz/2,sz/2,sz/2*0.6,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}

function renderBarChart(ctx,W,H,labels,iD,eD){
  var pad={t:8,b:26,l:42,r:6};
  var cW=W-pad.l-pad.r;var cH=H-pad.t-pad.b;
  var maxV=Math.max.apply(null,iD.concat(eD).concat([1]));
  ctx.clearRect(0,0,W,H);
  // grid
  for(var g=0;g<=4;g++){var gy=pad.t+cH*(1-g/4);ctx.strokeStyle='#f0efe8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();}
  ctx.fillStyle='#ccc';ctx.font='9px sans-serif';ctx.textAlign='right';
  for(var g2=0;g2<=4;g2++){var gy2=pad.t+cH*(1-g2/4);var v=Math.round(maxV*g2/4);ctx.fillText(v>=10000?Math.round(v/1000)+'k':''+v,pad.l-3,gy2+3);}
  var bW=cW/labels.length;var bh=Math.max(4,Math.floor(bW*0.22));
  labels.forEach(function(lbl,i){
    var x=pad.l+i*bW+bW/2;
    var ih=Math.max(0,cH*(iD[i]/maxV));var eh=Math.max(0,cH*(eD[i]/maxV));
    ctx.fillStyle='rgba(10,122,94,.8)';fillRR(ctx,x-bh*2-1,pad.t+cH-ih,bh*2,ih,3);
    ctx.fillStyle='rgba(176,58,26,.8)';fillRR(ctx,x+1,pad.t+cH-eh,bh*2,eh,3);
    ctx.fillStyle='#bbb';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText(lbl,x,H-8);
  });
}

function renderCFChart(ctx,W,H,labels,iD,eD,bD){
  var pad={t:8,b:24,l:42,r:6};
  var cW=W-pad.l-pad.r;var cH=H-pad.t-pad.b;
  var maxV=Math.max.apply(null,iD.concat(eD).concat([1]));
  ctx.clearRect(0,0,W,H);
  for(var g=0;g<=4;g++){var gy=pad.t+cH*(1-g/4);ctx.strokeStyle='#f0efe8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();}
  ctx.fillStyle='#ccc';ctx.font='9px sans-serif';ctx.textAlign='right';
  for(var g2=0;g2<=4;g2++){var gy2=pad.t+cH*(1-g2/4);var v=Math.round(maxV*g2/4);ctx.fillText(v>=10000?Math.round(v/1000)+'k':''+v,pad.l-3,gy2+3);}
  var bW=cW/labels.length;var bh=Math.max(3,Math.floor(bW*0.18));
  labels.forEach(function(lbl,i){
    var x=pad.l+i*bW+bW/2;
    var ih=Math.max(0,cH*(iD[i]/maxV));var eh=Math.max(0,cH*(eD[i]/maxV));
    if(ih)ctx.fillStyle='rgba(10,122,94,.65)',fillRR(ctx,x-bh*2-1,pad.t+cH-ih,bh*2,ih,2);
    if(eh)ctx.fillStyle='rgba(176,58,26,.65)',fillRR(ctx,x+1,pad.t+cH-eh,bh*2,eh,2);
    ctx.fillStyle='#bbb';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.fillText(lbl,x,H-6);
  });
  // 収支ライン
  ctx.strokeStyle='#2563eb';ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();
  labels.forEach(function(lbl,i){
    var x=pad.l+i*bW+bW/2;
    var y=pad.t+cH*(1-Math.max(-maxV,Math.min(maxV,bD[i]))/maxV);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  labels.forEach(function(lbl,i){
    var x=pad.l+i*bW+bW/2;
    var y=pad.t+cH*(1-Math.max(-maxV,Math.min(maxV,bD[i]))/maxV);
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=bD[i]>=0?'#2563eb':'#c0392b';ctx.fill();
  });
}

function fillRR(ctx,x,y,w,h,r){
  if(h<=0)return;r=Math.min(r,h/2,w/2);
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();ctx.fill();
}

function exportCSV(){
  var rows=[['種類','日付','金額','カテゴリ','品名','支払方法','メモ']];
  S.incomes.forEach(function(i){rows.push(['収入',i.date,i.amount,i.category,i.name,'',i.memo||'']);});
  S.expenses.forEach(function(e){rows.push(['支出',e.date,e.amount,e.category,e.name,e.payment,e.memo||'']);});
  var blob=new Blob(['\uFEFF'+rows.map(function(r){return r.join(',');}).join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cashflow.csv';a.click();
}
