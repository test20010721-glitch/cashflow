<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>キャッシュフロー管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#e8e7e0;min-height:100vh}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif;font-size:14px;color:#1a1a1a;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;background:#f0efe8;position:relative}
.hdr{background:#fff;border-bottom:1px solid #e4e3dc;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.mnav{display:flex;align-items:center;gap:4px}
.mnav button{background:none;border:none;cursor:pointer;font-size:22px;color:#777;padding:2px 8px;line-height:1}
.mnav .mlbl{font-size:14px;font-weight:600;min-width:90px;text-align:center}
.hbtns{display:flex;gap:6px}
.nav{display:flex;background:#fff;border-top:1px solid #e4e3dc;position:sticky;bottom:0;z-index:10}
.nb{flex:1;padding:7px 2px 9px;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;font-size:9px;color:#aaa}
.nb.on{color:#2563eb}
.ni{font-size:19px;line-height:1.2}
.page{padding:12px;padding-bottom:84px}
.card{background:#fff;border-radius:14px;border:1px solid #eaeae4;margin-bottom:10px;overflow:hidden}
.chd{padding:11px 14px;border-bottom:1px solid #f0efe8;display:flex;align-items:center;justify-content:space-between}
.cti{font-size:12px;font-weight:600;color:#888}
.cbd{padding:12px 14px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mc{background:#fff;border-radius:12px;border:1px solid #eaeae4;padding:11px 12px}
.mla{font-size:11px;color:#aaa;margin-bottom:3px}
.mva{font-size:18px;font-weight:700}
.ci{color:#0a7a5e}.ce{color:#b03a1a}.cp{color:#1d4ed8}.cn{color:#c0392b}
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 13px;border-radius:9px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#333;white-space:nowrap}
.btn:active{opacity:.75}
.bblu{background:#2563eb;color:#fff;border-color:#2563eb}
.bred{color:#c0392b;border-color:#f0a0a0}
.bsm{padding:5px 10px;font-size:12px}
.bic{padding:5px 6px;border:none;background:none;cursor:pointer;font-size:15px;color:#ccc;border-radius:6px}
.pb{height:6px;background:#f0efe8;border-radius:3px;overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:3px}
.cbar{display:flex;height:9px;border-radius:5px;overflow:hidden;margin:7px 0 10px}
.tx{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f2f2ec}
.tx:last-child{border-bottom:none}
.txico{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.txi{background:#dbeafe;color:#1d4ed8}
.txe{background:#fee2e2;color:#b03a1a}
.txinfo{flex:1;min-width:0}
.txname{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.txmeta{font-size:10px;color:#aaa;margin-top:2px}
.txamt{font-size:13px;font-weight:700;flex-shrink:0}
.tai{color:#1d4ed8}.tae{color:#b03a1a}
.li{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f2f2ec}
.li:last-child{border-bottom:none}
.linfo{flex:1;min-width:0}
.lname{font-size:13px;font-weight:600}
.lsub{font-size:11px;color:#aaa;margin-top:2px}
.lamt{font-size:14px;font-weight:700;flex-shrink:0}
.lacts{display:flex;flex-shrink:0}
.bdg{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.b1{background:#dbeafe;color:#1e40af}.b2{background:#dcfce7;color:#166534}.b3{background:#fef3c7;color:#92400e}
.b4{background:#fee2e2;color:#991b1b}.b5{background:#ede9fe;color:#5b21b6}.b6{background:#f3f4f6;color:#555}
.tabs{display:flex;gap:5px;margin-bottom:11px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;border-radius:20px;border:1px solid #ddd;background:none;cursor:pointer;font-size:12px;font-weight:600;color:#888;white-space:nowrap}
.tab.on{background:#2563eb;color:#fff;border-color:#2563eb}
.sbox{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:8px 12px;margin-bottom:10px}
.sbox input{border:none;background:none;outline:none;flex:1;font-size:14px;color:#1a1a1a}
.acd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:11px 14px}
.irrtag{display:inline-flex;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600;margin-top:3px}
.empty{text-align:center;padding:20px;color:#ccc;font-size:13px}
.paytag{display:inline-flex;align-items:center;gap:3px;background:#dbeafe;color:#1e40af;border-radius:20px;padding:4px 8px 4px 10px;font-size:12px;font-weight:600;margin:2px}
.paytag button{background:none;border:none;cursor:pointer;color:#93b4e0;font-size:14px;padding:0 0 0 2px;line-height:1}
.warn{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:12px;color:#92400e;margin-bottom:12px;line-height:1.5}
canvas{display:block;background:#fff}

/* ── モーダル ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:18px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal form{padding:20px 16px 24px}
.moti{font-size:15px;font-weight:700;margin-bottom:16px;text-align:center}
.fgrp{margin-bottom:12px}
.flbl{font-size:12px;color:#777;margin-bottom:4px;display:block;font-weight:500}
.finp{width:100%;padding:10px 12px;border-radius:9px;border:1px solid #ddd;background:#fff;font-size:16px;color:#1a1a1a;outline:none;-webkit-appearance:none;appearance:none}
.finp:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.frow{display:flex;gap:8px}
.frow>.fgrp{flex:1}
.mobt{display:flex;gap:8px;margin-top:4px}
.mobt .btn{flex:1;justify-content:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
'use strict';

var IC=['給料','副業','ココナラ','アプリ売上','動画編集','その他'];
var EC=['食費','交通費','固定費','サブスク','娯楽','美容','日用品','その他'];
var CC={'給料':'b2','副業':'b1','ココナラ':'b5','アプリ売上':'b3','動画編集':'b4','その他':'b6',
  '食費':'b4','交通費':'b1','固定費':'b3','サブスク':'b5','娯楽':'b2','美容':'b6','日用品':'b1'};
var CRDS=['楽天カード','三井住友カード','ビューカード'];
var CCOL=['#2563eb','#0a7a5e','#d97706'];

function fmt(n){return '¥'+Math.abs(Math.round(n)).toLocaleString('ja-JP');}
function toDay(){return new Date().toISOString().split('T')[0];}
function nowYM(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1);}
function p2(n){return String(n).padStart(2,'0');}
function sumA(a,f){return a.reduce(function(s,x){return s+(f?f(x):x);},0);}

/* ── 状態 ── */
var S={
  page:'dashboard', ym:nowYM(),
  incomes:[
    {id:1,date:'2026-05-01',amount:250000,category:'給料',     name:'5月給与',    memo:''},
    {id:2,date:'2026-05-10',amount:55000, category:'アプリ売上',name:'アプリ収益', memo:''},
    {id:3,date:'2026-05-15',amount:35000, category:'ココナラ',  name:'デザイン案件',memo:''},
    {id:4,date:'2026-05-12',amount:80000, category:'動画編集',  name:'動画編集案件',memo:''},
  ],
  expenses:[
    {id:1,date:'2026-05-02',amount:12000,payment:'楽天カード',    category:'食費',   name:'スーパーまとめ買い',memo:''},
    {id:2,date:'2026-05-03',amount:2500, payment:'PayPay',        category:'食費',   name:'カフェ',           memo:''},
    {id:3,date:'2026-05-05',amount:68000,payment:'三井住友カード',category:'固定費', name:'家賃',             memo:''},
    {id:4,date:'2026-05-07',amount:980,  payment:'楽天カード',    category:'サブスク',name:'Netflix',         memo:''},
    {id:5,date:'2026-05-08',amount:3000, payment:'ビューカード',  category:'交通費', name:'新幹線',           memo:''},
    {id:6,date:'2026-05-10',amount:8000, payment:'楽天カード',    category:'娯楽',   name:'ゲーム',           memo:''},
    {id:7,date:'2026-05-11',amount:1500, payment:'PayPay',        category:'食費',   name:'コンビニ',         memo:''},
    {id:8,date:'2026-05-13',amount:5000, payment:'現金',          category:'美容',   name:'散髪',             memo:''},
    {id:9,date:'2026-05-14',amount:3500, payment:'三井住友カード',category:'食費',   name:'外食',             memo:''},
  ],
  payments:['現金','PayPay','楽天カード','三井住友カード','ビューカード'],
  subs:[
    {id:1,name:'Netflix',     amount:980, day:7, payment:'楽天カード',    irregs:[]},
    {id:2,name:'ChatGPT Plus',amount:3200,day:15,payment:'楽天カード',    irregs:[]},
    {id:3,name:'Adobe CC',    amount:6480,day:1, payment:'三井住友カード',irregs:[]},
    {id:4,name:'Spotify',     amount:980, day:10,payment:'楽天カード',    irregs:[]},
  ],
  fixed:[
    {id:1,name:'家賃',  amount:68000,payment:'三井住友カード',irregs:[]},
    {id:2,name:'電気代',amount:8000, payment:'楽天カード',    irregs:[]},
    {id:3,name:'水道代',amount:3000, payment:'現金',          irregs:[]},
    {id:4,name:'ガス代',amount:2500, payment:'現金',          irregs:[]},
  ],
  locked:{},
  txTab:'all', txQ:'', txCat:'', txPay:'',
  openCard:null,
  irrTgt:null,
};

/* ── モーダル状態（別管理） ── */
var M={
  type:null,  // 'income'|'expense'|'sub'|'fixed'|'irr'|'confirm'|'lockEdit'
  edit:null,
  confirmCb:null,
  irrRange:false,
};

function effAmt(item,ym){
  if(!item||!item.irregs)return item?item.amount:0;
  for(var i=0;i<item.irregs.length;i++){
    var irr=item.irregs[i];
    if(irr.ym&&irr.ym===ym)return irr.amount;
    if(irr.from&&irr.to&&ym>=irr.from&&ym<=irr.to)return irr.amount;
  }
  return item.amount;
}
function fixedForYM(ym){
  var lk=S.locked[ym];
  if(lk){
    return S.fixed.map(function(f){
      var base=null;for(var i=0;i<lk.fixed.length;i++){if(lk.fixed[i].id===f.id){base=lk.fixed[i];break;}}
      var manual=lk.manual&&lk.manual['f'+f.id];
      return Object.assign({},f,{_eff:manual!==undefined?manual:(base?base.amount:effAmt(f,ym))});
    });
  }
  return S.fixed.map(function(f){return Object.assign({},f,{_eff:effAmt(f,ym)});});
}
function subsForYM(ym){
  var lk=S.locked[ym];
  if(lk){
    return S.subs.map(function(s){
      var base=null;for(var i=0;i<lk.subs.length;i++){if(lk.subs[i].id===s.id){base=lk.subs[i];break;}}
      var manual=lk.manual&&lk.manual['s'+s.id];
      return Object.assign({},s,{_eff:manual!==undefined?manual:(base?base.amount:effAmt(s,ym))});
    });
  }
  return S.subs.map(function(s){return Object.assign({},s,{_eff:effAmt(s,ym)});});
}

function calc(){
  var ym=S.ym,yr=+ym.slice(0,4),mo=+ym.slice(5);
  var mI=S.incomes.filter(function(x){return x.date.slice(0,7)===ym;});
  var mE=S.expenses.filter(function(x){return x.date.slice(0,7)===ym;});
  var tI=sumA(mI,function(x){return x.amount;});
  var tE=sumA(mE,function(x){return x.amount;});
  var fxL=fixedForYM(ym);var sbL=subsForYM(ym);
  var fT=sumA(fxL,function(x){return x._eff;});var sT=sumA(sbL,function(x){return x._eff;});
  var crT=sumA(mE.filter(function(e){return CRDS.indexOf(e.payment)>=0;}),function(x){return x.amount;});
  var yI=sumA(S.incomes.filter(function(x){return x.date.slice(0,4)===''+yr;}),function(x){return x.amount;});
  var yE=sumA(S.expenses.filter(function(x){return x.date.slice(0,4)===''+yr;}),function(x){return x.amount;});
  return {ym:ym,yr:yr,mo:mo,mI:mI,mE:mE,tI:tI,tE:tE,bal:tI-tE,fT:fT,sT:sT,rem:tI-tE-fT,crT:crT,yI:yI,yE:yE,fxL:fxL,sbL:sbL};
}

/* ── レンダリング ── */
function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  var c=calc();
  app.appendChild(buildHdr(c));
  var pg=ce('div','page');
  if(S.page==='dashboard')    pg.appendChild(buildDash(c));
  if(S.page==='transactions') pg.appendChild(buildTx(c));
  if(S.page==='credit')       pg.appendChild(buildCredit(c));
  if(S.page==='cashflow')     pg.appendChild(buildFlow(c));
  if(S.page==='settings')     pg.appendChild(buildSettings(c));
  app.appendChild(pg);
  app.appendChild(buildNav());
  if(M.type) app.appendChild(buildModal(c));
  requestAnimationFrame(drawGraphs);
}

/* ── DOM ヘルパー ── */
function ce(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function tx(s){return document.createTextNode(String(s==null?'':s));}
function mk(tag,cls,text){var e=ce(tag,cls);if(text!=null)e.textContent=text;return e;}

function buildHdr(c){
  var hdr=ce('div','hdr');
  var mn=ce('div','mnav');
  var pb=ce('button');pb.textContent='‹';pb.onclick=function(){chMonth(-1);};
  var nb=ce('button');nb.textContent='›';nb.onclick=function(){chMonth(1);};
  var lbl=mk('span','mlbl',c.yr+'年'+c.mo+'月');
  mn.append(pb,lbl,nb);
  var bs=ce('div','hbtns');
  var b1=ce('button','btn bsm');b1.textContent='＋収入';b1.onclick=function(){openM('income',null);};
  var b2=ce('button','btn bblu bsm');b2.textContent='＋支出';b2.onclick=function(){openM('expense',null);};
  bs.append(b1,b2);hdr.append(mn,bs);return hdr;
}

function buildNav(){
  var nav=ce('nav','nav');
  [['dashboard','📊','ダッシュ'],['transactions','📋','収支'],['credit','💳','クレカ'],['cashflow','📈','推移'],['settings','⚙️','設定']].forEach(function(x){
    var b=ce('button','nb'+(S.page===x[0]?' on':''));
    b.innerHTML='<span class="ni">'+x[1]+'</span>'+x[2];
    b.onclick=function(){S.page=x[0];render();};
    nav.appendChild(b);
  });
  return nav;
}

function pbar(pct,col){
  var b=ce('div','pb');var f=ce('div','pf');
  f.style.width=pct+'%';f.style.background=col;b.appendChild(f);return b;
}
function bdg(text,cls){return mk('span','bdg '+cls,text);}
function cardEl(title,right){
  var c=ce('div','card');
  var hd=ce('div','chd');hd.appendChild(mk('span','cti',title));
  if(right)hd.appendChild(right);c.appendChild(hd);return c;
}
function mc2(label,val,cls){
  var m=ce('div','mc');
  m.appendChild(mk('div','mla',label));m.appendChild(mk('div','mva '+cls,val));return m;
}
function fgrpEl(label,inp){
  var g=ce('div','fgrp');
  g.appendChild(mk('label','flbl',label));g.appendChild(inp);return g;
}
function textInput(name,placeholder,val,inputmode){
  var i=ce('input','finp');
  i.name=name;i.type='text';
  if(inputmode)i.setAttribute('inputmode',inputmode);
  i.placeholder=placeholder||'';
  if(val)i.value=val;
  return i;
}
function dateInput(name,val){
  var i=ce('input','finp');i.name=name;i.type='date';if(val)i.value=val;return i;
}
function monthInput(name,val){
  var i=ce('input','finp');i.name=name;i.type='month';if(val)i.value=val;return i;
}
function selectInput(name,options,current){
  var s=ce('select','finp');s.name=name;
  options.forEach(function(o){
    var opt=document.createElement('option');opt.value=o;opt.textContent=o;
    if(o===current)opt.selected=true;s.appendChild(opt);
  });
  return s;
}
function openM(type,item){M.type=type;M.edit=item;render();}
function closeM(){M.type=null;M.edit=null;render();}
function chMonth(d){
  var p=S.ym.split('-').map(Number);
  var dt=new Date(p[0],p[1]-1+d,1);
  S.ym=dt.getFullYear()+'-'+p2(dt.getMonth()+1);render();
}
function confirm2(cb){M.confirmCb=cb;M.type='confirm';render();}

/* ── モーダル（HTML form使用） ── */
function buildModal(c){
  var ov=ce('div','overlay');
  ov.onclick=function(e){if(e.target===ov)closeM();};
  var mo=ce('div','modal');
  ov.appendChild(mo);

  if(M.type==='income')   mo.appendChild(formIncome());
  if(M.type==='expense')  mo.appendChild(formExpense());
  if(M.type==='sub')      mo.appendChild(formSub());
  if(M.type==='fixed')    mo.appendChild(formFixed());
  if(M.type==='irr')      mo.appendChild(formIrr());
  if(M.type==='lockEdit') mo.appendChild(formLockEdit(c));
  if(M.type==='confirm')  mo.appendChild(buildConfirm());
  return ov;
}

/* ── フォーム共通ラッパー ── */
function wrapForm(title,fields,onSubmit,saveLabel){
  var form=ce('form');
  form.style.padding='20px 16px 24px';
  form.appendChild(mk('div','moti',title));
  fields.forEach(function(f){form.appendChild(f);});
  var btns=ce('div','mobt');
  var cb=ce('button','btn');cb.type='button';cb.textContent='キャンセル';cb.onclick=closeM;
  var sb=ce('button','btn bblu');sb.type='submit';sb.textContent=saveLabel||'保存する';
  btns.append(cb,sb);form.appendChild(btns);
  form.onsubmit=function(e){
    e.preventDefault();
    var fd=new FormData(form);
    onSubmit(fd);
  };
  return form;
}

/* ── 収入フォーム ── */
function formIncome(){
  var init=M.edit;
  return wrapForm(
    init?'収入を編集':'収入を追加',
    [
      fgrpEl('日付',      dateInput('date',init?init.date:toDay())),
      fgrpEl('金額（円）',textInput('amount','例: 50000',init?String(init.amount):''  ,'numeric')),
      fgrpEl('カテゴリ',  selectInput('category',IC,init?init.category:'給料')),
      fgrpEl('品名',      textInput('name','給与・案件名など',init?init.name:'')),
      fgrpEl('メモ',      textInput('memo','任意',init?init.memo||'':'')),
    ],
    function(fd){
      var amt=parseInt((fd.get('amount')||'').replace(/[^0-9]/g,''),10);
      var name=(fd.get('name')||'').trim();
      if(!amt||!name){alert('金額と品名を入力してください');return;}
      var data={date:fd.get('date'),amount:amt,category:fd.get('category'),name:name,memo:fd.get('memo')||''};
      if(init)S.incomes=S.incomes.map(function(x){return x.id===init.id?Object.assign({id:x.id},data):x;});
      else S.incomes.push(Object.assign({id:Date.now()},data));
      closeM();
    },
    init?'更新する':'保存する'
  );
}

/* ── 支出フォーム ── */
function formExpense(){
  var init=M.edit;
  var row=ce('div','frow');
  row.append(fgrpEl('支払方法',selectInput('payment',S.payments,init?init.payment:S.payments[0])));
  row.append(fgrpEl('カテゴリ',selectInput('category',EC,init?init.category:'食費')));
  return wrapForm(
    init?'支出を編集':'支出を追加',
    [
      fgrpEl('日付',      dateInput('date',init?init.date:toDay())),
      fgrpEl('金額（円）',textInput('amount','例: 3000',init?String(init.amount):'','numeric')),
      row,
      fgrpEl('品名',      textInput('name','何を買ったか',init?init.name:'')),
      fgrpEl('メモ',      textInput('memo','任意',init?init.memo||'':'')),
    ],
    function(fd){
      var amt=parseInt((fd.get('amount')||'').replace(/[^0-9]/g,''),10);
      var name=(fd.get('name')||'').trim();
      if(!amt||!name){alert('金額と品名を入力してください');return;}
      var data={date:fd.get('date'),amount:amt,payment:fd.get('payment'),category:fd.get('category'),name:name,memo:fd.get('memo')||''};

function buildFlow(c){
  var f=document.createDocumentFragment();
  var yr=c.yr;var ms=[];for(var i=0;i<12;i++)ms.push(yr+'-'+p2(i+1));
  var iD=ms.map(function(m){return sumA(S.incomes.filter(function(x){return x.date.slice(0,7)===m;}),function(x){return x.amount;});});
  var eD=ms.map(function(m){return sumA(S.expenses.filter(function(x){return x.date.slice(0,7)===m;}),function(x){return x.amount;});});
  var bD=ms.map(function(_,i){return iD[i]-eD[i];});
  var aI=sumA(iD),aE=sumA(eD),aB=aI-aE;
  var mg=ce('div','mg');mg.append(mc2('年間収入',fmt(aI),'ci'),mc2('年間支出',fmt(aE),'ce'));
  var bm=mc2('年間収支',(aB>=0?'+':'')+fmt(aB),aB>=0?'cp':'cn');bm.style.gridColumn='1/-1';mg.appendChild(bm);f.appendChild(mg);
  var gc=cardEl(yr+'年 月別キャッシュフロー',null);var gb=ce('div','cbd');gb.style.padding='10px 8px';
  var cv=document.createElement('canvas');cv.id='g-cf';cv.style.cssText='width:100%;height:190px';
  gb.appendChild(cv);gc.appendChild(gb);f.appendChild(gc);
  S._cfM=ms;S._cfI=iD;S._cfE=eD;S._cfB=bD;
  var dc=cardEl('月別明細',null);var db=ce('div','cbd');db.style.padding='0';
  ms.forEach(function(m,i){
    if(!iD[i]&&!eD[i])return;
    var b=bD[i];var row=ce('div','');row.style.cssText='padding:9px 14px;border-bottom:1px solid #f5f5f0';
    var top=ce('div','');top.style.cssText='display:flex;justify-content:space-between';
    var mo=mk('span','',m.slice(5)+'月');mo.style.cssText='font-weight:600;font-size:13px';
    var ba=mk('span','',(b>=0?'+':'')+fmt(b));ba.style.cssText='font-weight:700;color:'+(b>=0?'#1d4ed8':'#c0392b')+';font-size:13px';
    top.append(mo,ba);var sub=mk('div','','収入 '+fmt(iD[i])+'　支出 '+fmt(eD[i]));sub.style.cssText='font-size:11px;color:#bbb;margin-top:2px';
    row.append(top,sub);db.appendChild(row);
  });
  dc.appendChild(db);f.appendChild(dc);
  var catT={};S.expenses.filter(function(e){return e.date.slice(0,4)===''+yr;}).forEach(function(e){catT[e.category]=(catT[e.category]||0)+e.amount;});
  var catE=Object.entries(catT).sort(function(a,b){return b[1]-a[1];});
  if(catE.length){
    var cc2=cardEl('年間カテゴリ別支出',null);var cb2=ce('div','cbd');
    catE.forEach(function(kv){
      var row=ce('div','');row.style.marginBottom='9px';
      var top2=ce('div','');top2.style.cssText='display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px';
      var av=mk('span','',fmt(kv[1]));av.style.fontWeight='700';
      top2.append(mk('span','',kv[0]),av);row.append(top2,pbar(catE[0][1]>0?Math.round(kv[1]/catE[0][1]*100):0,'#2563eb'));cb2.appendChild(row);
    });
    cc2.appendChild(cb2);f.appendChild(cc2);
  }
  return f;
}

/* ── 設定 ── */
function buildSettings(c){
  var f=document.createDocumentFragment();
  var sT=sumA(c.sbL,function(x){return x._eff;});
  var fT=sumA(c.fxL,function(x){return x._eff;});

  function addBtn(type){var b=ce('button','btn bsm');b.textContent='＋追加';b.onclick=function(){openM(type,null);};return b;}
  function totalLabel(v){var s=mk('span','',fmt(v)+'/月');s.style.cssText='font-size:12px;font-weight:700;color:#b03a1a;margin-right:6px';return s;}

  var sr=ce('div','');sr.append(totalLabel(sT),addBtn('sub'));
  var sc=cardEl('サブスク管理',sr);var sb=ce('div','cbd');
  if(!S.subs.length)sb.appendChild(mk('div','empty','未登録'));
  else S.subs.forEach(function(s){sb.appendChild(listItem(s,'sub',c.ym));});
  sc.appendChild(sb);f.appendChild(sc);

  var fr2=ce('div','');fr2.append(totalLabel(fT),addBtn('fixed'));
  var fc=cardEl('固定費管理',fr2);var fb=ce('div','cbd');
  if(!S.fixed.length)fb.appendChild(mk('div','empty','未登録'));
  else S.fixed.forEach(function(item){fb.appendChild(listItem(item,'fixed',c.ym));});
  fc.appendChild(fb);f.appendChild(fc);

  var pc=cardEl('支払方法管理',null);var pb3=ce('div','cbd');
  var pr=ce('div','');pr.style.cssText='display:flex;gap:7px;margin-bottom:10px';
  var pi=ce('input','finp');pi.type='text';pi.placeholder='新しい支払方法';pi.id='new-pay';
  var pa=ce('button','btn bsm');pa.textContent='追加';
  pa.onclick=function(){var v=pi.value.trim();if(v&&S.payments.indexOf(v)<0){S.payments.push(v);render();}};
  pr.append(pi,pa);pb3.appendChild(pr);
  var bl=ce('div','');bl.style.cssText='display:flex;flex-wrap:wrap;gap:4px';
  S.payments.forEach(function(p){
    var wrap=ce('div','paytag');wrap.appendChild(tx(p));
    var del=ce('button','');del.type='button';del.textContent='×';del.style.cssText='background:none;border:none;cursor:pointer;color:#93b4e0;font-size:14px;padding:0 0 0 2px;line-height:1';
    del.onclick=(function(p2){return function(){confirm2(function(){S.payments=S.payments.filter(function(x){return x!==p2;});render();});};})(p);
    wrap.appendChild(del);bl.appendChild(wrap);
  });
  pb3.appendChild(bl);pc.appendChild(pb3);f.appendChild(pc);

  var ec=cardEl('データエクスポート',null);var eb=ce('div','cbd');
  var xb=ce('button','btn');xb.style.cssText='width:100%;justify-content:center';xb.textContent='📥 CSVダウンロード';
  xb.onclick=exportCSV;eb.appendChild(xb);ec.appendChild(eb);f.appendChild(ec);

  var lk=S.locked[c.ym];
  var lc=cardEl('月次確定',null);var lb=ce('div','cbd');
  var note=mk('div','','確定すると固定費・サブスクが将来の変更に影響されなくなります。');note.style.cssText='font-size:12px;color:#aaa;margin-bottom:10px;line-height:1.6';
  lb.appendChild(note);
  if(lk){
    lb.appendChild(mk('div','warn','✅ '+c.yr+'年'+c.mo+'月は確定済みです。'));
    var eb2=ce('button','btn bblu');eb2.style.cssText='width:100%;justify-content:center;margin-bottom:8px';eb2.textContent='✏️ この月の金額を修正する';
    eb2.onclick=function(){openM('lockEdit',null);};lb.appendChild(eb2);
    var ub=ce('button','btn bred');ub.style.cssText='width:100%;justify-content:center';ub.textContent='🔓 確定を解除する';
    ub.onclick=function(){
      confirm2(function(){
        var lkData=S.locked[c.ym];
        if(lkData&&lkData.manual){
          Object.keys(lkData.manual).forEach(function(key){
            var typ=key.slice(0,1),id=+key.slice(1),amt=lkData.manual[key];
            var arr=typ==='f'?S.fixed:S.subs;
            var it=arr.filter(function(x){return x.id===id;})[0];
            if(it){var fd2=false;for(var i2=0;i2<it.irregs.length;i2++){if(it.irregs[i2].ym===c.ym){it.irregs[i2].amount=amt;fd2=true;break;}}if(!fd2)it.irregs.push({ym:c.ym,amount:amt});}
          });
        }
        delete S.locked[c.ym];render();
      });
    };
    lb.appendChild(ub);
  } else {
    var lockBtn=ce('button','btn bblu');lockBtn.style.cssText='width:100%;justify-content:center';lockBtn.textContent='🔒 '+c.yr+'年'+c.mo+'月を確定する';
    lockBtn.onclick=function(){
      S.locked[c.ym]={fixed:S.fixed.map(function(f2){return {id:f2.id,name:f2.name,amount:effAmt(f2,c.ym)};}),subs:S.subs.map(function(s){return {id:s.id,name:s.name,amount:effAmt(s,c.ym)};}),manual:{}};render();
    };
    lb.appendChild(lockBtn);
  }
  lc.appendChild(lb);f.appendChild(lc);
  return f;
}

function listItem(item,type,ym){
  var ea=item._eff!==undefined?item._eff:effAmt(item,ym);
  var row=ce('div','li');
  var info=ce('div','linfo');info.appendChild(mk('div','lname',item.name));
  var sub=mk('div','lsub',type==='sub'?'毎月'+item.day+'日 · '+item.payment:item.payment);
  if((item.irregs||[]).length)sub.appendChild(mk('div','irrtag','⚡ イレギュラーあり'));
  info.appendChild(sub);
  var acts=ce('div','lacts');
  var eb=ce('button','bic');eb.textContent='✎';eb.onclick=function(){openM(type,item);};
  var ib=ce('button','bic');ib.textContent='📅';ib.onclick=function(){S.irrTgt={type:type,id:item.id,ym:ym};openM('irr',null);};
  var db=ce('button','bic');db.textContent='🗑';
  db.onclick=(function(item2,type2){return function(){confirm2(function(){if(type2==='sub')S.subs=S.subs.filter(function(x){return x.id!==item2.id;});else S.fixed=S.fixed.filter(function(x){return x.id!==item2.id;});render();});};})(item,type);
  acts.append(eb,ib,db);
  row.append(info,mk('span','lamt',fmt(ea)),acts);return row;
}

/* ── 取引行 ── */
function txRow(item){
  var row=ce('div','tx');
  var ico=mk('div','txico '+(item.type==='income'?'txi':'txe'),item.type==='income'?'↑':'↓');
  var info=ce('div','txinfo');info.appendChild(mk('div','txname',item.name));
  var meta=ce('div','txmeta');meta.appendChild(bdg(item.category,CC[item.category]||'b6'));
  if(item.payment)meta.appendChild(tx(' '+item.payment));
  meta.appendChild(tx(' '+item.date.slice(5).replace('-','/')));
  info.appendChild(meta);
  var amt=mk('span','txamt '+(item.type==='income'?'tai':'tae'),(item.type==='income'?'+':'-')+fmt(item.amount));
  var acts=ce('div','lacts');
  var eb=ce('button','bic');eb.textContent='✎';eb.onclick=function(){openM(item.type==='income'?'income':'expense',item);};
  var db=ce('button','bic');db.textContent='🗑';
  db.onclick=(function(item2){return function(){confirm2(function(){if(item2.type==='income')S.incomes=S.incomes.filter(function(x){return x.id!==item2.id;});else S.expenses=S.expenses.filter(function(x){return x.id!==item2.id;});render();});};})(item);
  acts.append(eb,db);row.append(ico,info,amt,acts);return row;
}

/* ── グラフ ── */
function drawGraphs(){
  var c=calc();drawBar(c);drawPie();drawCF();
}
function drawBar(c){
  var cv=document.getElementById('g-dash');if(!cv)return;
  var W=Math.max(cv.parentElement.clientWidth-16,260),H=160;cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d'),yr=c.yr,mo=c.mo;
  var ms=[];for(var i=0;i<6;i++){var dt=new Date(yr,mo-1-5+i,1);ms.push(dt.getFullYear()+'-'+p2(dt.getMonth()+1));}
  var iD=ms.map(function(m){return sumA(S.incomes.filter(function(x){return x.date.slice(0,7)===m;}),function(x){return x.amount;});});
  var eD=ms.map(function(m){return sumA(S.expenses.filter(function(x){return x.date.slice(0,7)===m;}),function(x){return x.amount;});});
  bChart(ctx,W,H,ms.map(function(m){return m.slice(5)+'月';}),iD,eD);
}
function drawCF(){
  var cv=document.getElementById('g-cf');if(!cv||!S._cfM)return;
  var W=Math.max(cv.parentElement.clientWidth-16,260),H=190;cv.width=W;cv.height=H;
  cfChart(cv.getContext('2d'),W,H,S._cfM.map(function(m){return +m.slice(5)+'月';}),S._cfI,S._cfE,S._cfB);
}
function drawPie(){
  var cv=document.getElementById('g-pie');if(!cv||!S._catE||!S._catE.length)return;
  var sz=88;cv.width=sz;cv.height=sz;var ctx=cv.getContext('2d');
  var total=sumA(S._catE,function(kv){return kv[1];});var start=-Math.PI/2;
  S._catE.forEach(function(kv,i){var a=kv[1]/total*Math.PI*2;ctx.beginPath();ctx.moveTo(sz/2,sz/2);ctx.arc(sz/2,sz/2,sz/2-2,start,start+a);ctx.closePath();ctx.fillStyle=S._catCols[i];ctx.fill();start+=a;});
  ctx.beginPath();ctx.arc(sz/2,sz/2,sz/2*0.6,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}
function bChart(ctx,W,H,labs,iD,eD){
  var pad={t:8,b:26,l:42,r:6},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  var maxV=Math.max.apply(null,iD.concat(eD).concat([100]));
  ctx.clearRect(0,0,W,H);
  for(var g=0;g<=4;g++){var gy=pad.t+cH*(1-g/4);ctx.strokeStyle='#f0efe8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();}
  ctx.fillStyle='#ccc';ctx.font='9px sans-serif';ctx.textAlign='right';
  for(var g2=0;g2<=4;g2++){var gy2=pad.t+cH*(1-g2/4);var v=Math.round(maxV*g2/4);ctx.fillText(v>=10000?Math.round(v/1000)+'k':''+v,pad.l-3,gy2+3);}
  var bW=cW/labs.length,bh=Math.max(4,Math.floor(bW*0.22));
  labs.forEach(function(lbl,i){var x=pad.l+i*bW+bW/2,ih=Math.max(0,cH*(iD[i]/maxV)),eh=Math.max(0,cH*(eD[i]/maxV));ctx.fillStyle='rgba(10,122,94,.8)';rr(ctx,x-bh*2-1,pad.t+cH-ih,bh*2,ih);ctx.fillStyle='rgba(176,58,26,.8)';rr(ctx,x+1,pad.t+cH-eh,bh*2,eh);ctx.fillStyle='#bbb';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText(lbl,x,H-8);});
}
function cfChart(ctx,W,H,labs,iD,eD,bD){
  var pad={t:8,b:24,l:42,r:6},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  var maxV=Math.max.apply(null,iD.concat(eD).concat([100]));
  ctx.clearRect(0,0,W,H);
  for(var g=0;g<=4;g++){var gy=pad.t+cH*(1-g/4);ctx.strokeStyle='#f0efe8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();}
  ctx.fillStyle='#ccc';ctx.font='9px sans-serif';ctx.textAlign='right';
  for(var g2=0;g2<=4;g2++){var gy2=pad.t+cH*(1-g2/4);var v=Math.round(maxV*g2/4);ctx.fillText(v>=10000?Math.round(v/1000)+'k':''+v,pad.l-3,gy2+3);}
  var bW=cW/labs.length,bh=Math.max(3,Math.floor(bW*0.18));
  labs.forEach(function(lbl,i){var x=pad.l+i*bW+bW/2,ih=Math.max(0,cH*(iD[i]/maxV)),eh=Math.max(0,cH*(eD[i]/maxV));if(ih){ctx.fillStyle='rgba(10,122,94,.65)';rr(ctx,x-bh*2-1,pad.t+cH-ih,bh*2,ih);}if(eh){ctx.fillStyle='rgba(176,58,26,.65)';rr(ctx,x+1,pad.t+cH-eh,bh*2,eh);}ctx.fillStyle='#bbb';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.fillText(lbl,x,H-6);});
  ctx.strokeStyle='#2563eb';ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();
  labs.forEach(function(lbl,i){var x=pad.l+i*bW+bW/2,y=pad.t+cH*(1-Math.max(-maxV,Math.min(maxV,bD[i]))/maxV);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
  labs.forEach(function(lbl,i){var x=pad.l+i*bW+bW/2,y=pad.t+cH*(1-Math.max(-maxV,Math.min(maxV,bD[i]))/maxV);ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=bD[i]>=0?'#2563eb':'#c0392b';ctx.fill();});
}
function rr(ctx,x,y,w,h){if(h<=0||w<=0)return;var r=Math.min(3,h/2,w/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();ctx.fill();}

function exportCSV(){
  var rows=[['種類','日付','金額','カテゴリ','品名','支払方法','メモ']];
  S.incomes.forEach(function(i){rows.push(['収入',i.date,i.amount,i.category,i.name,'',i.memo||'']);});
  S.expenses.forEach(function(e){rows.push(['支出',e.date,e.amount,e.category,e.name,e.payment,e.memo||'']);});
  var blob=new Blob(['\uFEFF'+rows.map(function(r){return r.join(',');}).join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cashflow.csv';a.click();
}

render();
})();
</script>
